<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Login - House Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header class="header">
        <nav class="nav-container">
            <a href="/" class="logo">🏠 House Manager</a>
            <div class="nav-links">
                <a href="/" class="back-link">← Back to Home</a>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <h1>Manager Access</h1>

        <div class="card" style="max-width: 400px; margin: 0 auto;">
            <h2>Login to Your Account</h2>

            <form action="/login" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                <input id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>

            <div class="mt-3 text-center">
                <p>Don't have an account? <a href="/register" style="color: #4f46e5;">Register here</a></p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 House Manager. Secure manager access portal.</p>
        </div>
    </footer>
</body>
</html>
</html>
